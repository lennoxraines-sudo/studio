<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta id="viewport" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Friday Night Funkin'</title>
    <link rel="shortcut icon" type="image/png" href="https://cdn.jsdelivr.net/gh/genizy/fridayfunk/favicon.png">
    <base href="https://cdn.jsdelivr.net/gh/genizy/fridayfunk/">

    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/genizy/fridayfunk/Funkin.js"></script>

    <script>
        window.addEventListener("touchmove", function(event) {
            event.preventDefault();
        }, { capture: false, passive: false });

        if (typeof window.devicePixelRatio != 'undefined' && window.devicePixelRatio > 2) {
            var meta = document.getElementById("viewport");
            meta.setAttribute('content', 'width=device-width, initial-scale=' + (2 / window.devicePixelRatio) + ', user-scalable=no');
        }
    </script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        #openfl-content {
            background: #000000;
            width: 100%;
            height: 100%;
        }

        @font-face {
            font-family: '5by7';
            src: url('assets/fonts/5by7.eot?#iefix') format('embedded-opentype'),
                 url('assets/fonts/5by7.woff') format('woff'),
                 url('assets/fonts/5by7.ttf') format('truetype'),
                 url('assets/fonts/5by7.svg#5by7') format('svg');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'VCR OSD Mono';
            src: url('assets/fonts/vcr.eot?#iefix') format('embedded-opentype'),
                 url('assets/fonts/vcr.woff') format('woff'),
                 url('assets/fonts/vcr.ttf') format('truetype'),
                 url('assets/fonts/vcr.svg#VCR OSD Mono') format('svg');
        }
    </style>
</head>
<body>
    <div id="openfl-content"></div>
    <script type="text/javascript">
        lime.embed("Funkin", "openfl-content", 1280, 720, { parameters: {} });
    </script>
</body>
</html>
