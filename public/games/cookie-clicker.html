<html>
<head>
    <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/cookieclicker/">
    <script>
        var VERSION = 2.058;
        var BETA = 0;
        var SAVESUFFIX = '';
        var App = typeof App === 'undefined' ? 0 : App;
        var PRESETMODS = [];
        var LOCAL = (App || !window.location.hostname || window.location.hostname !== 'localhost' || window.location.hostname !== '127.0.0.1');
    </script>
    <title>Cookie Clicker</title>
    <meta name="viewport" content="width=900, initial-scale=1">
    <link rel="shortcut icon" href="img/favicon.ico" />

    <link href="style.css?v=10c" rel="stylesheet" type="text/css">

    <div id="wrapper">
        <div id="game">
            <div id="versionNumber" class="title"></div>

                    </div>
                    <div id="statsButton" class="panelButton">
                        <div>Stats</div>
                    </div>
                    <div id="commentsText">
                        <div id="commentsText1" class="commentsText"></div>
                    </div>
                </div>
                <div id="centerArea">
                    <div id="rows"></div>
                    <div id="menu"></div>
                </div>
            </div>
            <div id="sectionRight" class="inset">
                <div id="store">
                    <div id="storeTitle" class="inset title zoneTitle">Store</div>
                    <div id="upgrades" class="storeSection upgradeBox"></div>

            </div>
        </div>
    </div>
