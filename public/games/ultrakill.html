
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultrakill Web Port</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; color: #fff; font-family: 'Courier New', Courier, monospace; }
        #game-container { width: 100%; height: 100%; position: relative; }
        #canvas-mock { width: 100%; height: 100%; background: linear-gradient(45deg, #1a0000, #330000); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: crosshair; }
        .ui { position: absolute; bottom: 20px; left: 20px; font-size: 24px; color: #ff0000; text-shadow: 2px 2px #000; }
        .loading { font-size: 18px; color: #aaa; text-transform: uppercase; letter-spacing: 4px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .hint { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="canvas-mock">
            <div class="loading">Invasive Data Detected...</div>
            <div style="font-size: 48px; font-weight: bold; margin-top: 20px; color: #f00;">ULTRAKILL</div>
            <div style="margin-top: 40px; border: 1px solid #f00; padding: 10px 20px;">CLICK TO START MISSION</div>
            <div class="hint">Pointer Lock Enabled | Press ESC to release</div>
        </div>
        <div class="ui">HEALTH: 100 | BLOOD: 0</div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        
        container.addEventListener('click', () => {
            if (container.requestPointerLock) {
                container.requestPointerLock();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === container) {
                console.log('Pointer locked');
            } else {
                console.log('Pointer released');
            }
        });
    </script>
</body>
</html>
