<!DOCTYPE html>
<html lang="en-us">
<head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/web-port@master/ultrakill/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | ULTRAKILL</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; width: 100%; background: #000; }
        #unity-container { width: 100%; height: 100%; position: fixed; top: 0; left: 0; }
        #loading-text { color: white; font-family: cursive; font-size: 48px; text-align: center; margin-top: 20px; position: absolute; width: 100%; z-index: 10; }
    </style>
</head>
<body>
    <div id='loading-text'>LOADING...</div>
    <canvas id="unity-canvas" tabindex="-1" hidden></canvas>
    <script src="Build/ultrakill.loader.js"></script>
    <script>
        var canvas = document.querySelector("#unity-canvas");
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.width = window.innerWidth + "px";
            canvas.style.height = window.innerHeight + "px";
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                let buffers = [];
                function fetchPart(index) {
                    if (index >= fileParts.length) {
                        let mergedBlob = new Blob(buffers);
                        resolve(URL.createObjectURL(mergedBlob));
                        return;
                    }
                    fetch(fileParts[index]).then(r => r.arrayBuffer()).then(data => {
                        buffers.push(data);
                        fetchPart(index + 1);
                    }).catch(reject);
                }
                fetchPart(0);
            });
        }
        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) parts.push(file + ".part" + i);
            return parts;
        }

        Promise.all([
            mergeFiles(getParts("Build/ultrakill.data.unityweb", 1, 4)),
            mergeFiles(getParts("Build/ultrakill.wasm.unityweb", 1, 2))
        ]).then(([dataUrl, wasmurl]) => {
            canvas.hidden = false;
            createUnityInstance(canvas, {
                dataUrl: dataUrl,
                frameworkUrl: "Build/ultrakill.framework.js.unityweb",
                codeUrl: wasmurl,
                streamingAssetsUrl: "StreamingAssets",
                companyName: "Hakita and Cake Logic",
                productName: "ULTRAKILL",
                productVersion: "1.4",
            }).then(() => document.querySelector("#loading-text").remove());
        });
    </script>
</body>
</html>
