    <style type="text/css">
        * { padding: 0; margin: 0; }
        html, body {
            background: #000;
            color: #fff;
            overflow: hidden;
            touch-action: none;

            width: 100%;
            height: 100%;
        }
        canvas {
            touch-action-delay: none;
            touch-action: none;

        @font-face {
            font-family: Oswald Regular;

        #button { display:none; }
        .imgb_vis { animation: imgb-animation 7s linear; }
        @keyframes imgb-animation {
            10% { transform: translateX(0); }
            20% { transform: translateX(100px); }
            90% { transform: translateX(100px); }
            100% { transform: translateX(0); }
        }
        #c2canvasdiv {
            width: 100% !important;
            height: 100% !important;

        }

</head>
<body dir="ltr"> 
    <div id="fb-root"></div>
    <script>
        function On_GameLoaded() { isGameLoaded = true; }
        function Show_Ads() { if(typeof c2_callFunction === 'function') c2_callFunction("On_GameResumed"); }
        (function(){
            if (window.location.protocol.substr(0, 4) ==="file") {
                alert("Exported games won't work until you upload them.");
            }
        })();
    </script>
    <div id="c2canvasdiv">
        <canvas id="c2canvas" width="1262" height="928">
            <h1>Your browser does not appear to support HTML5.</h1>
        </canvas>
        <input type="text" id="nameInput" autocomplete="off" placeholder="Your Name Here" spellcheck="false" style="position: absolute; top: 432px; left: 50%; transform: translateX(-50%); width: 373px; height: 35px; border: none; background-color: rgba(0, 0, 0, 0.4); color: rgb(255, 255, 255); font-size: 20px; font-family: 'Oswald', sans-serif; padding: 10px; border-radius: 100px; text-align: center;">

    <script>
        jQuery(document).ready(function () { 
            if(typeof cr_createRuntime === 'function') cr_createRuntime("c2canvas"); 
        });
        function onVisibilityChanged() {
            if (typeof cr_setSuspended === 'function') {
                if (document.hidden || document.mozHidden || document.webkitHidden || document.msHidden) cr_setSuspended(true);
                else cr_setSuspended(false);
            }
        };
        document.addEventListener("visibilitychange", onVisibilityChanged, false);
        document.addEventListener("mozvisibilitychange", onVisibilityChanged, false);
        document.addEventListener("webkitvisibilitychange", onVisibilityChanged, false);
        document.addEventListener("msvisibilitychange", onVisibilityChanged, false);
    </script>
